      <stop offset="1" stop-color="#7C3AED"/>
    </linearGradient>
  </defs>
  <path d="M4 3h6.6L28 29h-6.6L4 3Z" fill="url(#f)"/>
  <path d="M28 3h-6.6L4 29h6.6L28 3Z" fill="url(#f)" opacity="0.34"/>
